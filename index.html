<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blush: #EDE8E1;
    --blush-dark: #E0D9D0;
    --ink: #2C2825;
    --ink-light: #6B635C;
    --dusty-blue: #7A8FA6;
    --dusty-blue-light: #B8C8D8;
    --coral: #C4735A;
    --paper: #F5F1EC;
  }
  body {
    background: var(--blush);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-light);
  }
  .nav-modes {
    display: flex; gap: 4px;
    background: rgba(245,241,236,0.9); backdrop-filter: blur(10px);
    border: 1px solid rgba(44,40,37,0.1); border-radius: 100px; padding: 5px 8px;
  }
  .mode-btn {
    width: 34px; height: 34px; border-radius: 100px; border: none;
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--ink-light); transition: all 0.2s;
  }
  .mode-btn:hover { background: rgba(44,40,37,0.08); }
  .mode-btn.active { background: var(--ink); color: var(--paper); }
  .mode-btn svg { width: 15px; height: 15px; }

  .view { display: none; width: 100vw; height: 100vh; }
  .view.active { display: flex; }

  #view-book { align-items: center; justify-content: center; flex-direction: column; }

  .book-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    perspective: 2000px;
  }
  .book {
    width: clamp(280px, 50vw, 580px);
    height: clamp(200px, 38vw, 420px);
    position: relative;
  }
  .book-back {
    position: absolute; inset: 0;
    background: var(--blush-dark);
    border-radius: 4px 14px 14px 4px;
    box-shadow: 8px 14px 50px rgba(44,40,37,0.15);
  }
  .book-spine {
    position: absolute; left: 0; top: 0; bottom: 0; width: 20px; z-index: 5;
    background: linear-gradient(to right, #C8C0B6, #D8D0C6);
    border-radius: 4px 0 0 4px;
    box-shadow: inset -2px 0 5px rgba(44,40,37,0.12);
  }
  .book-page {
    position: absolute; inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1);
    z-index: 3;
  }
  .book-page.flipping { transform: rotateY(-180deg); }
  .page-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    background: var(--paper);
    border-radius: 4px 14px 14px 4px;
    box-shadow: -4px 8px 30px rgba(44,40,37,0.18);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .page-face.back {
    transform: rotateY(180deg);
    border-radius: 14px 4px 4px 14px;
    box-shadow: 4px 8px 30px rgba(44,40,37,0.14);
  }
  .page-img {
    flex: 1; display: flex; align-items: center; justify-content: center; font-size: clamp(32px,5vw,60px);
  }
  .page-info { padding: 14px 18px; border-top: 1px solid rgba(44,40,37,0.06); }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--ink); margin-bottom: 3px; }
  .page-meta { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-light); }
  .book-cover {
    position: absolute; inset: 0; z-index: 2;
    background: var(--paper);
    border-radius: 4px 14px 14px 4px;
    box-shadow: -4px 8px 30px rgba(44,40,37,0.18);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    padding: 32px; text-align: center;
  }
  .book-cover.hidden { display: none; }
  .cover-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 2.5vw, 28px);
    font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase;
    line-height: 1.3; color: var(--ink); margin-bottom: 18px;
  }
  .cover-cats {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-light);
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .cover-cats span { opacity: 0.6; }
  .cover-open {
    margin-top: 24px; background: none; border: 1px solid rgba(44,40,37,0.2);
    color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; padding: 9px 22px;
    border-radius: 100px; cursor: pointer; transition: all 0.2s;
  }
  .cover-open:hover { background: var(--ink); color: var(--paper); }
  .page-controls { display: flex; align-items: center; gap: 14px; margin-top: 20px; }
  .ctrl-btn {
    background: none; border: 1px solid rgba(44,40,37,0.18); color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 8px 18px; border-radius: 100px; cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .page-num { font-size: 11px; letter-spacing: 0.2em; color: var(--ink-light); min-width: 48px; text-align: center; }

  #view-globe {
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 40% 35%, #1A2540 0%, #0A0D18 100%);
  }
  .globe-wrap { position: relative; }
  .globe-svg { width: clamp(280px,55vw,520px); height: clamp(280px,55vw,520px); cursor: grab; display: block; }
  .globe-svg:active { cursor: grabbing; }
  .globe-tip {
    position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); white-space: nowrap;
  }
  .globe-card {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.88);
    background: var(--paper); border-radius: 14px; padding: 22px; width: 260px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55); z-index: 60;
    opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .globe-card.open { opacity: 1; pointer-events: all; transform: translate(-50%,-50%) scale(1); }
  .gc-img { width: 100%; height: 140px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 44px; margin-bottom: 14px; }
  .gc-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--ink); margin-bottom: 4px; }
  .gc-meta { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 16px; }
  .gc-close { background: none; border: 1px solid rgba(44,40,37,0.15); color: var(--ink-light); font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 16px; border-radius: 100px; cursor: pointer; }

  #view-map { overflow: hidden; cursor: grab; background: var(--blush-dark); position: relative; }
  #view-map:active { cursor: grabbing; }
  .map-canvas { position: absolute; width: 2800px; height: 1800px; top: 0; left: 0; transform-origin: 0 0; }
  .map-card {
    position: absolute; background: var(--paper); border-radius: 8px;
    box-shadow: 0 4px 22px rgba(44,40,37,0.13); overflow: hidden; cursor: pointer; transition: box-shadow 0.2s;
  }
  .map-card:hover { box-shadow: 0 12px 40px rgba(44,40,37,0.22); z-index: 10; }
  .map-card-img { display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .map-card-label { padding: 10px 14px; font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--ink); }
  .minimap {
    position: fixed; bottom: 20px; right: 20px; width: 110px; height: 72px;
    background: rgba(245,241,236,0.88); backdrop-filter: blur(8px);
    border: 1px solid rgba(44,40,37,0.1); border-radius: 8px; overflow: hidden; z-index: 50;
  }
  .mini-vp { position: absolute; background: rgba(44,40,37,0.14); border: 1px solid rgba(44,40,37,0.28); border-radius: 2px; }
  .map-hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-light);
    background: rgba(245,241,236,0.88); backdrop-filter: blur(8px);
    padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(44,40,37,0.1);
    z-index: 50; pointer-events: none; transition: opacity 1.2s;
  }
  .map-hint.gone { opacity: 0; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Tiny Universe</div>
  <div class="nav-modes">
    <button class="mode-btn active" data-v="book" title="Book">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="12" y1="7" x2="17" y2="7"/><line x1="12" y1="11" x2="17" y2="11"/></svg>
    </button>
    <button class="mode-btn" data-v="globe" title="Globe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
    </button>
    <button class="mode-btn" data-v="map" title="Map">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    </button>
  </div>
</nav>

<div id="view-book" class="view active">
  <div class="book-wrap">
    <div class="book">
      <div class="book-back"></div>
      <div class="book-spine"></div>
      <div class="book-page" id="bPage">
        <div class="page-face front">
          <div class="page-img" id="pFrontImg" style="background:#B8C8D8">🎨</div>
          <div class="page-info">
            <div class="page-title" id="pFrontTitle">Dragon in the Sky</div>
            <div class="page-meta" id="pFrontMeta">Drawn by hand</div>
          </div>
        </div>
        <div class="page-face back">
          <div class="page-img" id="pBackImg" style="background:#C8D8B8">🧱</div>
          <div class="page-info">
            <div class="page-title" id="pBackTitle">The Space Station</div>
            <div class="page-meta" id="pBackMeta">Built piece by piece</div>
          </div>
        </div>
      </div>
      <div class="book-cover" id="bCover">
        <div class="cover-title">Everything here was<br>made by one person.</div>
        <div class="cover-cats">
          <span>Drawn by hand</span>·<span>Made from scratch</span>·<span>Built piece by piece</span>
        </div>
        <button class="cover-open" id="coverOpen">Open the book</button>
      </div>
    </div>
  </div>
  <div class="page-controls" id="pageControls" style="display:none">
    <button class="ctrl-btn" id="prevP">← Prev</button>
    <span class="page-num" id="pageNum">1 / 6</span>
    <button class="ctrl-btn" id="nextP">Next →</button>
  </div>
</div>

<div id="view-globe" class="view">
  <div class="globe-wrap">
    <svg class="globe-svg" id="gSvg" viewBox="0 0 500 500">
      <defs>
        <radialGradient id="gg" cx="38%" cy="32%"><stop offset="0%" stop-color="#253560"/><stop offset="100%" stop-color="#080C18"/></radialGradient>
        <radialGradient id="gs" cx="32%" cy="28%"><stop offset="0%" stop-color="rgba(255,255,255,0.07)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
        <clipPath id="gc"><circle cx="250" cy="250" r="218"/></clipPath>
      </defs>
      <circle cx="250" cy="250" r="218" fill="url(#gg)"/>
      <g clip-path="url(#gc)" stroke="rgba(100,140,190,0.1)" stroke-width="1" fill="none">
        <ellipse cx="250" cy="250" rx="218" ry="38"/>
        <ellipse cx="250" cy="250" rx="218" ry="98"/>
        <ellipse cx="250" cy="250" rx="218" ry="165"/>
        <line x1="32" y1="250" x2="468" y2="250"/>
        <line x1="250" y1="32" x2="250" y2="468"/>
        <line x1="96" y1="96" x2="404" y2="404"/>
        <line x1="404" y1="96" x2="96" y2="404"/>
      </g>
      <circle cx="250" cy="250" r="218" fill="url(#gs)"/>
      <circle cx="250" cy="250" r="218" fill="none" stroke="rgba(100,150,220,0.12)" stroke-width="2"/>
      <g id="gPins"></g>
    </svg>
    <div class="globe-tip">Drag to rotate · Click a dot to open</div>
  </div>
  <div class="globe-card" id="gCard">
    <div class="gc-img" id="gcImg">🎨</div>
    <div class="gc-title" id="gcTitle">-</div>
    <div class="gc-meta" id="gcMeta">-</div>
    <button class="gc-close" id="gcClose">Close</button>
  </div>
</div>

<div id="view-map" class="view">
  <div class="map-canvas" id="mCanvas"></div>
  <div class="minimap"><div class="mini-vp" id="miniVp"></div></div>
  <div class="map-hint" id="mHint">Drag anywhere · Scroll to zoom</div>
</div>

<script>
const works = [
  { title:"Dragon in the Sky",   cat:"Drawn by hand",       emoji:"🎨", bg:"#B8C8D8" },
  { title:"The Space Station",   cat:"Built piece by piece", emoji:"🧱", bg:"#C8D8B8" },
  { title:"Paper Castle",        cat:"Made from scratch",    emoji:"✂️", bg:"#D8C0B0" },
  { title:"Rainbow Waterfall",   cat:"Drawn by hand",       emoji:"🖍️", bg:"#B8C8D8" },
  { title:"Robot Friend",        cat:"Built piece by piece", emoji:"🤖", bg:"#C8D8B8" },
  { title:"Woven Basket",        cat:"Made from scratch",    emoji:"🧺", bg:"#D8C0B0" },
];

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.v).classList.add('active');
  });
});

let cur = 0, flipping = false;
const bPage = document.getElementById('bPage');

document.getElementById('coverOpen').addEventListener('click', () => {
  document.getElementById('bCover').classList.add('hidden');
  document.getElementById('pageControls').style.display = 'flex';
  renderPage();
});

function renderPage() {
  const f = works[cur % works.length];
  const b = works[(cur+1) % works.length];
  document.getElementById('pFrontImg').textContent = f.emoji;
  document.getElementById('pFrontImg').style.background = f.bg;
  document.getElementById('pFrontTitle').textContent = f.title;
  document.getElementById('pFrontMeta').textContent = f.cat;
  document.getElementById('pBackImg').textContent = b.emoji;
  document.getElementById('pBackImg').style.background = b.bg;
  document.getElementById('pBackTitle').textContent = b.title;
  document.getElementById('pBackMeta').textContent = b.cat;
  document.getElementById('pageNum').textContent = `${cur+1} / ${works.length}`;
  bPage.classList.remove('flipping');
  flipping = false;
}

document.getElementById('nextP').addEventListener('click', () => {
  if (flipping) return;
  flipping = true;
  bPage.classList.add('flipping');
  setTimeout(() => { cur = (cur+1) % works.length; renderPage(); }, 900);
});

document.getElementById('prevP').addEventListener('click', () => {
  if (flipping) return;
  cur = (cur - 1 + works.length) % works.length;
  renderPage();
});

const pinData = [
  {x:310,y:175,wi:0},{x:190,y:215,wi:1},{x:355,y:295,wi:2},
  {x:155,y:310,wi:3},{x:275,y:355,wi:4},{x:225,y:158,wi:5}
];
const gPins = document.getElementById('gPins');
const catColor = {'Drawn by hand':'#7A9FC4','Built piece by piece':'#8AB07A','Made from scratch':'#C4835A'};

pinData.forEach(p => {
  const col = catColor[works[p.wi].cat];
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.cursor = 'pointer';
  const halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
  halo.setAttribute('cx',p.x); halo.setAttribute('cy',p.y); halo.setAttribute('r','14');
  halo.setAttribute('fill',col); halo.setAttribute('opacity','0.18');
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',p.x); dot.setAttribute('cy',p.y); dot.setAttribute('r','6');
  dot.setAttribute('fill',col);
  g.append(halo,dot);
  g.addEventListener('click',()=>openCard(p.wi));
  gPins.appendChild(g);
});

let gDrag=false,gSX=0;
const gSvg=document.getElementById('gSvg');
gSvg.addEventListener('mousedown',e=>{gDrag=true;gSX=e.clientX;});
window.addEventListener('mousemove',e=>{
  if(!gDrag)return;
  gPins.setAttribute('transform',`translate(${(e.clientX-gSX)*0.35},0)`);
});
window.addEventListener('mouseup',()=>gDrag=false);

const gCard=document.getElementById('gCard');
document.getElementById('gcClose').addEventListener('click',()=>gCard.classList.remove('open'));
function openCard(i){
  const w=works[i];
  document.getElementById('gcImg').textContent=w.emoji;
  document.getElementById('gcImg').style.background=w.bg;
  document.getElementById('gcTitle').textContent=w.title;
  document.getElementById('gcMeta').textContent=w.cat;
  gCard.classList.add('open');
}

const mCanvas=document.getElementById('mCanvas');
[
  {x:180,y:130,w:190,h:220,r:-2.5,wi:0},
  {x:460,y:80,w:230,h:190,r:2,wi:1},
  {x:780,y:180,w:175,h:210,r:-1.8,wi:2},
  {x:260,y:460,w:210,h:250,r:3,wi:3},
  {x:600,y:410,w:195,h:230,r:-2.2,wi:4},
  {x:960,y:300,w:230,h:195,r:1.8,wi:5},
].forEach(m=>{
  const w=works[m.wi];
  const el=document.createElement('div');
  el.className='map-card';
  el.style.cssText=`left:${m.x}px;top:${m.y}px;width:${m.w}px;transform:rotate(${m.r}deg)`;
  el.innerHTML=`<div class="map-card-img" style="height:${m.h-48}px;background:${w.bg}">${w.emoji}</div><div class="map-card-label">${w.title}</div>`;
  mCanvas.appendChild(el);
});

let mDrag=false,mSX=0,mSY=0,mX=-260,mY=-80,mSc=1;
const mView=document.getElementById('view-map');
const miniVp=document.getElementById('miniVp');
const mHint=document.getElementById('mHint');

function applyMap(){
  mCanvas.style.transform=`translate(${mX}px,${mY}px) scale(${mSc})`;
  const vw=mView.offsetWidth,vh=mView.offsetHeight;
  miniVp.style.cssText=`left:${(-mX/2800)*110}px;top:${(-mY/1800)*72}px;width:${(vw/2800)*110/mSc}px;height:${(vh/1800)*72/mSc}px`;
}

mView.addEventListener('mousedown',e=>{mDrag=true;mSX=e.clientX-mX;mSY=e.clientY-mY;setTimeout(()=>mHint.classList.add('gone'),1800);});
window.addEventListener('mousemove',e=>{if(!mDrag)return;mX=e.clientX-mSX;mY=e.clientY-mSY;applyMap();});
window.addEventListener('mouseup',()=>mDrag=false);
mView.addEventListener('wheel',e=>{e.preventDefault();mSc=Math.max(0.35,Math.min(2.2,mSc-e.deltaY*0.001));applyMap();},{passive:false});
applyMap();
</script>
</body>
</html>
