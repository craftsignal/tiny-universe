<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#EDE8E1;
  font-family:'DM Sans',sans-serif;
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;
}
nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 36px;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:12px;letter-spacing:0.3em;text-transform:uppercase;color:#6B635C;
}
.hint{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#A09890;}
.tabs{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  z-index:50;display:flex;gap:0;
  background:rgba(245,241,236,0.88);backdrop-filter:blur(10px);
  border:1px solid rgba(44,40,37,0.1);border-radius:100px;padding:4px;
}
.tab{
  background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  color:#6B635C;padding:8px 20px;border-radius:100px;transition:all 0.25s;white-space:nowrap;
}
.tab.active{background:#2C2825;color:#F5F1EC;}
.tab:hover:not(.active){color:#2C2825;background:rgba(44,40,37,0.06);}
canvas{display:block;cursor:grab;flex:1;}
canvas.dragging{cursor:grabbing}
.modal-bg{
  position:fixed;inset:0;z-index:100;
  background:rgba(8,12,24,0.5);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{
  background:#F5F1EC;border-radius:16px;
  width:min(400px,90vw);overflow:hidden;
  transform:translateY(20px) scale(0.95);
  transition:transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
}
.modal-bg.open .modal{transform:translateY(0) scale(1)}
.modal-img{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:64px;}
.modal-body{padding:22px 26px 26px}
.modal-cat{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#A09890;margin-bottom:6px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#2C2825;margin-bottom:6px;}
.modal-desc{font-size:13px;color:#8B7D70;line-height:1.6;margin-bottom:20px;}
.modal-close{
  background:none;border:1px solid rgba(44,40,37,0.18);
  color:#2C2825;font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  padding:8px 20px;border-radius:100px;cursor:pointer;transition:all 0.2s;
}
.modal-close:hover{background:#2C2825;color:#F5F1EC;}
</style>
</head>
<body>

<nav>
  <div class="logo">Tiny Universe</div>
  <div class="hint">Drag to rotate · Scroll to zoom</div>
</nav>

<div class="tabs">
  <button class="tab active" data-cat="all">All</button>
  <button class="tab" data-cat="drawings">Drawings</button>
  <button class="tab" data-cat="crafts">Crafts</button>
  <button class="tab" data-cat="legos">LEGOs</button>
</div>

<canvas id="c"></canvas>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-img" id="mImg"></div>
    <div class="modal-body">
      <div class="modal-cat" id="mCat"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-desc" id="mDesc"></div>
      <button class="modal-close" id="mClose">Close</button>
    </div>
  </div>
</div>

<script>
const allWorks=[
  {title:"Dragon in the Sky",    cat:"drawings", label:"Drawn by hand",        emoji:"🎨", bg:"#C8D8E8", desc:"Pencil and watercolour on white paper."},
  {title:"Rainbow Waterfall",    cat:"drawings", label:"Drawn by hand",        emoji:"🖍️", bg:"#C8D8E8", desc:"Crayon on construction paper."},
  {title:"Airplane Blueprint",   cat:"drawings", label:"Drawn by hand",        emoji:"✈️", bg:"#C8D8E8", desc:"Technically accurate. Probably."},
  {title:"Spotted Dog",          cat:"drawings", label:"Drawn by hand",        emoji:"🐶", bg:"#C8D8E8", desc:"Our dog, but with more spots."},
  {title:"Underwater World",     cat:"drawings", label:"Drawn by hand",        emoji:"🐠", bg:"#C8D8E8", desc:"Marker on cardboard."},
  {title:"Paper Castle",         cat:"crafts",   label:"Made from scratch",    emoji:"✂️", bg:"#D8C8B8", desc:"Cardboard, tape, and imagination."},
  {title:"Woven Basket",         cat:"crafts",   label:"Made from scratch",    emoji:"🧺", bg:"#D8C8B8", desc:"Woven from paper strips."},
  {title:"Mini Greenhouse",      cat:"crafts",   label:"Made from scratch",    emoji:"🌱", bg:"#D8C8B8", desc:"Popsicle sticks and plastic wrap."},
  {title:"Yarn Octopus",         cat:"crafts",   label:"Made from scratch",    emoji:"🐙", bg:"#D8C8B8", desc:"Eight arms, zero yarn left."},
  {title:"Paper Boat Fleet",     cat:"crafts",   label:"Made from scratch",    emoji:"⛵", bg:"#D8C8B8", desc:"A whole navy, made in one afternoon."},
  {title:"The Space Station",    cat:"legos",    label:"Built piece by piece", emoji:"🧱", bg:"#C8D8C8", desc:"432 pieces. Took three afternoons."},
  {title:"Robot Friend",         cat:"legos",    label:"Built piece by piece", emoji:"🤖", bg:"#C8D8C8", desc:"The robot's name is Beeper."},
  {title:"Rocket Launchpad",     cat:"legos",    label:"Built piece by piece", emoji:"🚀", bg:"#C8D8C8", desc:"T-minus always ready."},
  {title:"Castle Fortress",      cat:"legos",    label:"Built piece by piece", emoji:"🏰", bg:"#C8D8C8", desc:"Has a working drawbridge. Sort of."},
  {title:"Race Car Pit Stop",    cat:"legos",    label:"Built piece by piece", emoji:"🏎️", bg:"#C8D8C8", desc:"Fastest pit crew in the living room."},
];

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,cx,cy,R;
let rotX=0.25,rotY=0,velX=0,velY=0;
let zoom=1;
let dragging=false,lastX=0,lastY=0;
let activeTab='all';
let points=[];

function getWorks(){
  return activeTab==='all'?allWorks:allWorks.filter(w=>w.cat===activeTab);
}

function buildPoints(){
  const works=getWorks();
  const N=works.length;
  points=works.map((w,i)=>{
    const phi=Math.acos(-1+2*(i+0.5)/N);
    const theta=Math.PI*(1+Math.sqrt(5))*i;
    return{
      w,
      x:Math.sin(phi)*Math.cos(theta),
      y:Math.sin(phi)*Math.sin(theta),
      z:Math.cos(phi),
      scale:0,
    };
  });
  let delay=0;
  points.forEach(p=>{
    p.scale=0;
    setTimeout(()=>{ p._animating=true; },delay);
    delay+=40;
  });
}

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  R=Math.min(W,H)*0.36;
  cx=W/2;cy=H/2;
}

function project(px,py,pz){
  const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  let x1=px*cosY-pz*sinY;
  let z1=px*sinY+pz*cosY;
  let y1=py*cosX-z1*sinX;
  let z2=py*sinX+z1*cosX;
  return{sx:cx+x1*R*zoom,sy:cy-y1*R*zoom,sz:z2};
}

function cardW(d){return(100+d*60)*zoom;}
function cardH(d){return(72+d*44)*zoom;}

function drawCard(sx,sy,sz,w,alpha){
  const depth=Math.max(0,(sz+1)/2);
  const cw=cardW(depth),ch=cardH(depth);
  const x=sx-cw/2,y=sy-ch/2;
  const r=8;
  ctx.save();
  ctx.globalAlpha=alpha;
  if(sz>0){
    ctx.shadowColor='rgba(44,40,37,0.15)';
    ctx.shadowBlur=12*zoom*depth;
    ctx.shadowOffsetY=3*zoom*depth;
  }
  ctx.beginPath();
  ctx.roundRect(x,y,cw,ch,r);
  ctx.fillStyle='#F5F1EC';
  ctx.fill();
  ctx.shadowColor='transparent';
  const imgH=ch*0.7;
  ctx.beginPath();
  ctx.roundRect(x,y,cw,imgH,[r,r,0,0]);
  ctx.fillStyle=w.bg;
  ctx.fill();
  const fs=Math.round((sz>0?16+depth*16:12)*zoom);
  ctx.font=`${fs}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(w.emoji,sx,y+imgH/2);
  const tfs=Math.max(9,Math.round((8+depth*4)*zoom));
  ctx.font=`${tfs}px 'DM Sans',sans-serif`;
  ctx.fillStyle='#2C2825';
  let title=w.title;
  while(ctx.measureText(title).width>cw-12&&title.length>3)title=title.slice(0,-4)+'…';
  ctx.fillText(title,sx,y+imgH+(ch-imgH)/2);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  points.forEach(p=>{ if(p._animating) p.scale=Math.min(1,p.scale+0.06); });
  const proj=points.map(p=>{
    const pos=project(p.x,p.y,p.z);
    return{...pos,w:p.w,scale:p.scale};
  }).sort((a,b)=>a.sz-b.sz);
  proj.forEach(p=>{
    const depth=(p.sz+1)/2;
    const alpha=(p.sz>0?0.3+depth*0.65:0.06+depth*0.12)*p.scale;
    drawCard(p.sx,p.sy,p.sz,p.w,alpha);
  });
  if(!dragging){
    rotY+=velY;rotX+=velX;
    velX*=0.93;velY*=0.93;
    rotX=Math.max(-1.2,Math.min(1.2,rotX));
  }
  requestAnimationFrame(draw);
}

canvas.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;velX=0;velY=0;canvas.classList.add('dragging');});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  velY=(e.clientX-lastX)*0.008;velX=(e.clientY-lastY)*0.006;
  rotY+=velY;rotX+=velX;rotX=Math.max(-1.2,Math.min(1.2,rotX));
  lastX=e.clientX;lastY=e.clientY;
});
window.addEventListener('mouseup',()=>{dragging=false;canvas.classList.remove('dragging');});
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(0.5,Math.min(2,zoom-e.deltaY*0.001));},{passive:false});
canvas.addEventListener('touchstart',e=>{dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;velX=0;velY=0;},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(!dragging)return;
  velY=(e.touches[0].clientX-lastX)*0.008;velX=(e.touches[0].clientY-lastY)*0.006;
  rotY+=velY;rotX+=velX;rotX=Math.max(-1.2,Math.min(1.2,rotX));
  lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',()=>dragging=false);

canvas.addEventListener('click',e=>{
  if(Math.abs(velX)>0.01||Math.abs(velY)>0.01)return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const proj=points.map(p=>{
    const pos=project(p.x,p.y,p.z);
    return{...pos,w:p.w};
  }).filter(p=>p.sz>0).sort((a,b)=>b.sz-a.sz);
  for(const p of proj){
    const depth=(p.sz+1)/2;
    const cw=cardW(depth),ch=cardH(depth);
    if(mx>=p.sx-cw/2&&mx<=p.sx+cw/2&&my>=p.sy-ch/2&&my<=p.sy+ch/2){
      const w=p.w;
      document.getElementById('mImg').style.background=w.bg;
      document.getElementById('mImg').textContent=w.emoji;
      document.getElementById('mCat').textContent=w.label;
      document.getElementById('mTitle').textContent=w.title;
      document.getElementById('mDesc').textContent=w.desc;
      document.getElementById('modalBg').classList.add('open');
      break;
    }
  }
});

document.getElementById('mClose').addEventListener('click',()=>document.getElementById('modalBg').classList.remove('open'));
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeTab=tab.dataset.cat;
    buildPoints();
  });
});

window.addEventListener('resize',resize);
resize();
buildPoints();
draw();
</script>
</body>
</html>
